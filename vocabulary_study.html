// Count total vocab
let totalVocab = 0;
data.forEach(q => totalVocab += q.vocab.length);
document.getElementById('totalV').textContent = totalVocab;

let filteredData = [...data];
let fcIndex = 0;
let fcShown = false;
let allVocab = [];
data.forEach(q => q.vocab.forEach(v => allVocab.push({...v, qNum: q.num})));

function renderQuestions() {
  const list = document.getElementById('questionList');
  const noResult = document.getElementById('noResult');
  document.getElementById('showingQ').textContent = filteredData.length;

  if (filteredData.length === 0) {
    list.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  list.innerHTML = filteredData.map(q => {
    const vocabRows = q.vocab.map(v => `
      <tr>
        <td><span class="jp">${v.jp}</span><br><span class="reading">${v.reading}</span></td>
        <td class="vi">${v.vi}</td>
        <td class="example">${v.example || ''}</td>
      </tr>
    `).join('');

    const optionHtml = q.options.map((o, i) => `
      <div class="option" style="color:${i+1===q.answer?'#27ae60':'#444'}">
        ${i+1}. ${o} ${i+1===q.answer ? '✓' : ''}
      </div>
    `).join('');

    return `
      <div class="question-card" id="qcard-${q.num}">
        <div class="q-header" onclick="toggleQ(${q.num})">
          <div class="q-num">${q.num}</div>
          <div class="q-title">${q.question}</div>
          <div class="q-arrow" id="arrow-${q.num}">▼</div>
        </div>
        <div class="q-body" id="body-${q.num}">
          <div class="q-text">
            ${optionHtml}
          </div>
          <span class="answer-badge correct">✓ Đáp án: ${q.answer} — ${q.answerNote}</span>
          ${q.vocab.length > 0 ? `
          <table class="vocab-table">
            <thead><tr><th>Từ / Kanji</th><th>Nghĩa tiếng Việt</th><th>Ví dụ</th></tr></thead>
            <tbody>${vocabRows}</tbody>
          </table>` : '<p style="color:#999;font-size:0.82rem">Từ vựng đã có ở câu trước.</p>'}
        </div>
      </div>
    `;
  }).join('');
}

function toggleQ(num) {
  const body = document.getElementById('body-' + num);
  const arrow = document.getElementById('arrow-' + num);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function expandAll() {
  filteredData.forEach(q => {
    document.getElementById('body-' + q.num)?.classList.add('open');
    document.getElementById('arrow-' + q.num)?.classList.add('open');
  });
}

function collapseAll() {
  filteredData.forEach(q => {
    document.getElementById('body-' + q.num)?.classList.remove('open');
    document.getElementById('arrow-' + q.num)?.classList.remove('open');
  });
}

function filterQuestions() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const topic = document.getElementById('topicFilter').value;

  filteredData = data.filter(q => {
    const matchTopic = !topic || q.topic === topic;
    const matchSearch = !search || 
      q.num.toString().includes(search) ||
      q.question.toLowerCase().includes(search) ||
      q.vocab.some(v => v.jp.toLowerCase().includes(search) || v.vi.toLowerCase().includes(search) || v.reading.toLowerCase().includes(search));
    return matchTopic && matchSearch;
  });
  renderQuestions();
}

// Flashcard
function toggleFlashcard() {
  const fc = document.getElementById('flashcardSection');
  const nm = document.getElementById('normalMode');
  if (fc.classList.contains('active')) {
    fc.classList.remove('active');
    nm.classList.remove('hidden');
  } else {
    fc.classList.add('active');
    nm.classList.add('hidden');
    fcIndex = 0;
    fcShown = false;
    showFC();
  }
}

function showFC() {
  const v = allVocab[fcIndex];
  document.getElementById('fcJp').textContent = v.jp;
  document.getElementById('fcReading').textContent = v.reading;
  document.getElementById('fcVi').textContent = v.vi;
  document.getElementById('fcVi').style.display = 'none';
  document.getElementById('fcHint').textContent = '👆 Nhấn để xem nghĩa';
  document.getElementById('fcProgress').textContent = `${fcIndex + 1} / ${allVocab.length}  |  Câu ${v.qNum}`;
  fcShown = false;
}

function toggleFCAnswer() {
  const vi = document.getElementById('fcVi');
  const hint = document.getElementById('fcHint');
  if (!fcShown) {
    vi.style.display = 'block';
    hint.textContent = '→ Nhấn tiếp để qua từ tiếp';
    fcShown = true;
  } else {
    fcNext();
  }
}

function fcNext() { fcIndex = (fcIndex + 1) % allVocab.length; showFC(); }
function fcPrev() { fcIndex = (fcIndex - 1 + allVocab.length) % allVocab.length; showFC(); }
function fcShuffle() {
  for (let i = allVocab.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allVocab[i], allVocab[j]] = [allVocab[j], allVocab[i]];
  }
  fcIndex = 0;
  showFC();
}

renderQuestions();
</script>
